name: Global Invest Bot

on:
  schedule:
    - cron: '45 1 * * *' # 北京时间 09:45 运行（避开整点高峰）
    - cron: '50 6 * * *'  # 第二次运行：北京时间 14:50 (港股/日经接近收盘，决策当日动作)
  workflow_dispatch:      # 允许您在 GitHub 网页上手动点击触发

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Execute Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python main.py

      - name: Auto Save Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sentinel Insight Update: ${{ github.event.head_commit.timestamp }}"
          file_pattern: 'global_investment_log.csv'