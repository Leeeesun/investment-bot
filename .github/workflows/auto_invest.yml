name: Global Invest Bot

on:
  schedule:
    - cron: '35 1 * * *' # 北京时间 09:45 运行（避开整点高峰）
  workflow_dispatch:      # 允许您在 GitHub 网页上手动点击触发

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy matplotlib

      - name: Execute Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python main.py

      - name: Auto Save Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sentinel Insight Update: ${{ github.event.head_commit.timestamp }}"
          file_pattern: 'global_investment_log.csv'

      - name: Deploy Dashboard
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
