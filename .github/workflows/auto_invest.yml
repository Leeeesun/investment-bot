name: Global Invest Bot

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间 10:00 运行
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Execute Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }} # ！！！这里改成了智谱的密钥
        run: python main.py

      - name: Auto Log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sentinel Data Sync: ${{ github.event.head_commit.timestamp }}"
          file_pattern: 'global_investment_log.csv'